<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOT NA!</title>
<style>
  :root {
    --bg-dark: #14161a;
    --card-bg: #1e2127;
    --amber: #ffb703;
    --orange: #ff7b00;
    --beer: #f4a300;
    --text-light: #f5f5f5;
    --text-muted: #a0a4ab;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    background: radial-gradient(circle at 50% 20%, #23262d 0%, var(--bg-dark) 70%);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-light);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 20px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 40px 32px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(255, 183, 3, 0.08),
      0 0 40px rgba(255, 123, 0, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.5);
    position: relative;
    animation: floatIn 0.6s ease-out;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  h1 {
    font-size: 2.6rem;
    margin: 0 0 8px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--amber), var(--orange));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    margin-bottom: 32px;
    font-style: italic;
  }

  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    position: relative;
    min-height: 60px;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 14px 32px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #yesBtn {
    background: linear-gradient(135deg, var(--amber), var(--orange));
    color: #1a1300;
    box-shadow: 0 0 20px rgba(255, 183, 3, 0.5);
  }

  #yesBtn:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 0 30px rgba(255, 183, 3, 0.75);
  }

  #noBtn {
    background: #2a2d34;
    color: var(--text-light);
    border: 1px solid #3a3d44;
    position: fixed;
    z-index: 999;
    transition: top 0.18s ease, left 0.18s ease;
  }

  #noBtn:hover {
    background: #3a3d44;
    box-shadow: 0 0 15px rgba(255, 123, 0, 0.3);
  }

  #noBtn.static-pos {
    position: relative;
    top: auto;
    left: auto;
  }

  .hidden {
    display: none !important;
  }

  #rsvpForm {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.5s ease, max-height 0.6s ease;
  }

  #rsvpForm.show {
    opacity: 1;
    max-height: 600px;
  }

  .field {
    text-align: left;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--beer);
    margin-bottom: 6px;
    font-weight: 600;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    background: #14161a;
    border: 1px solid #3a3d44;
    border-radius: 10px;
    color: var(--text-light);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 12px rgba(255, 123, 0, 0.35);
  }

  input::-webkit-calendar-picker-indicator {
    filter: invert(0.8) sepia(1) saturate(4) hue-rotate(-10deg);
    cursor: pointer;
  }

  #submitBtn {
    background: linear-gradient(135deg, var(--orange), #ff5400);
    color: #fff;
    margin-top: 4px;
    box-shadow: 0 0 20px rgba(255, 84, 0, 0.4);
  }

  #submitBtn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 0 28px rgba(255, 84, 0, 0.65);
  }

  #submitBtn:active {
    transform: translateY(0) scale(0.98);
  }

  .yes-locked {
    opacity: 0.55;
    pointer-events: none;
    transform: scale(0.95);
  }

  #doneBox {
    margin-top: 28px;
    padding: 28px 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(255, 183, 3, 0.12), rgba(255, 84, 0, 0.12));
    border: 1px solid rgba(255, 123, 0, 0.4);
    box-shadow: 0 0 30px rgba(255, 123, 0, 0.25);
    animation: popIn 0.4s ease-out;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .done-emoji {
    font-size: 2.4rem;
    margin-bottom: 8px;
  }

  .done-title {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--amber), var(--orange));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .done-subtitle {
    margin-top: 6px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-light);
    letter-spacing: 0.5px;
  }

  /* Custom alert / toast */
  #toast {
    position: fixed;
    left: 50%;
    bottom: 40px;
    transform: translateX(-50%) translateY(20px);
    background: var(--card-bg);
    border: 1px solid var(--orange);
    color: var(--text-light);
    padding: 16px 24px;
    border-radius: 14px;
    box-shadow: 0 0 30px rgba(255, 123, 0, 0.4);
    font-size: 0.95rem;
    max-width: 90vw;
    text-align: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Cheer animation */
  #cheerLayer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1500;
    overflow: hidden;
  }

  .cheer-emoji {
    position: absolute;
    bottom: -60px;
    font-size: 2rem;
    opacity: 0;
    animation: cheerRise 2.2s ease-out forwards;
  }

  @keyframes cheerRise {
    0% {
      transform: translateY(0) rotate(0deg) scale(0.6);
      opacity: 0;
    }
    15% {
      opacity: 1;
    }
    100% {
      transform: translateY(-100vh) rotate(360deg) scale(1.2);
      opacity: 0;
    }
  }

  .cheer-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--amber), var(--orange));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    opacity: 0;
    z-index: 1600;
    pointer-events: none;
    animation: cheerPop 1.8s ease-out forwards;
  }

  @keyframes cheerPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-6deg); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }
    35% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  }

  /* Mobile responsiveness */
  @media (max-width: 480px) {
    body {
      padding: 16px;
    }

    h1 { font-size: 2.1rem; }
    
    .card { 
      padding: 32px 22px;
      border-radius: 20px;
    }
    
    button { 
      padding: 12px 22px; 
      font-size: 1rem; 
    }

    .btn-row {
      gap: 12px;
    }

    .cheer-text { font-size: 2.1rem; }

    .done-title { font-size: 1.5rem; }

    input {
      font-size: 16px; /* Prevents zoom on iOS */
    }
  }

  /* Landscape mode adjustments */
  @media (max-height: 600px) and (orientation: landscape) {
    body {
      padding: 12px;
      min-height: auto;
    }

    .card {
      padding: 24px 20px;
      max-width: 90vw;
    }

    h1 { font-size: 1.8rem; }

    button {
      padding: 10px 18px;
      font-size: 0.95rem;
    }

    #rsvpForm.show {
      max-height: 70vh;
      overflow-y: auto;
    }

    .cheer-text { font-size: 1.6rem; }
  }

  /* Very small devices */
  @media (max-width: 320px) {
    h1 { font-size: 1.8rem; }
    
    .card { 
      padding: 24px 16px;
    }
    
    button { 
      padding: 10px 16px; 
      font-size: 0.95rem;
    }

    .btn-row {
      gap: 8px;
    }
  }
</style>
</head>
<body>

  <div class="card">
    <h1>SHOT NA! 🍻</h1>
    <p class="subtitle">Bawal drawing</p>

    <div class="btn-row">
      <button id="yesBtn" onclick="handleYes()">YES</button>
      <button id="noBtn" onmouseover="dodgeButton()" onclick="dodgeButton()">NO</button>
    </div>

    <form id="rsvpForm" onsubmit="handleSubmit(event)">
      <div class="field">
        <label for="nameInput">👤 Pangalan mo?</label>
        <input type="text" id="nameInput" placeholder="e.g. Jun" required>
      </div>
      <div class="field">
        <label for="whenInput">🗓️ Kailan?</label>
        <input type="datetime-local" id="whenInput" required>
      </div>
      <div class="field">
        <label for="whereInput">📍 Saan?</label>
        <input type="text" id="whereInput" placeholder="e.g. Kuya Jun's Videoke Bar" required>
      </div>
      <button type="submit" id="submitBtn">Submit 🍻</button>
    </form>

    <div id="doneBox" class="hidden">
      <div class="done-emoji">🍻✅</div>
      <div class="done-title">DONE!</div>
      <div class="done-subtitle">WAG KANG TALKSHIT</div>
    </div>
  </div>

  <div id="toast"></div>
  <div id="cheerLayer"></div>

<script>
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const rsvpForm = document.getElementById('rsvpForm');
  const doneBox = document.getElementById('doneBox');
  const toast = document.getElementById('toast');

  // Store timer globally to prevent conflicts
  window._toastTimer = null;

  function dodgeButton() {
    // Don't dodge on very small screens or if NO button is hidden
    if (window.innerWidth < 320 || noBtn.classList.contains('hidden')) {
      return;
    }

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    // Fixed: Calculate bounds with proper safety checks
    const maxX = Math.max(10, window.innerWidth - btnWidth - 10);
    const maxY = Math.max(10, window.innerHeight - btnHeight - 10);

    // Ensure we stay within bounds
    const randomX = Math.max(10, Math.min(maxX, Math.floor(Math.random() * maxX)));
    const randomY = Math.max(10, Math.min(maxY, Math.floor(Math.random() * maxY)));

    noBtn.classList.remove('static-pos');
    noBtn.style.left = randomX + 'px';
    noBtn.style.top = randomY + 'px';
  }

  function handleYes() {
    noBtn.classList.add('hidden');
    yesBtn.classList.add('yes-locked');
    rsvpForm.classList.add('show');
    // Focus first input for better UX
    setTimeout(() => document.getElementById('nameInput').focus(), 300);
  }

  function handleSubmit(event) {
    event.preventDefault();

    const name = document.getElementById('nameInput').value.trim();
    const whenRaw = document.getElementById('whenInput').value;
    const where = document.getElementById('whereInput').value.trim();

    let whenFormatted = whenRaw;
    if (whenRaw) {
      // Parse datetime-local correctly (local time, not UTC)
      const [date, time] = whenRaw.split('T');
      const [year, month, day] = date.split('-');
      const [hours, minutes] = time.split(':');
      const dateObj = new Date(year, month - 1, day, hours, minutes);
      
      whenFormatted = dateObj.toLocaleString('en-PH', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    const message =
`🍻 SHOT NA GUYS! 🍻

👤 Sino: ${name}
🗓️ Kailan: ${whenFormatted}
📍 Saan: ${where}

Punta ah! Bawal Drawing 🥴🎉`;

    // Show confirmation, copy, then cheer
    showDoneBox();
    attemptCopy(message);

    setTimeout(() => {
      triggerCheer();
    }, 2000);

    // Fixed: Corrected syntax error (missing closing quote)
    setTimeout(() => {
      if (!window.close()) {
        showToast("✅ Exit mona!!");
      }
    }, 5000);
  }

  function triggerCheer() {
    const cheerLayer = document.getElementById('cheerLayer');
    const emojis = ['🍻', '🎉', '🥂', '🍺', '🎊'];

    // Big glowing "CHEERS!" text
    const cheerText = document.createElement('div');
    cheerText.className = 'cheer-text';
    cheerText.textContent = 'CHEERS! 🍻';
    document.body.appendChild(cheerText);
    setTimeout(() => cheerText.remove(), 1900);

    // Rising emoji burst
    const emojiCount = 24;
    for (let i = 0; i < emojiCount; i++) {
      const span = document.createElement('span');
      span.className = 'cheer-emoji';
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.animationDelay = (Math.random() * 0.6) + 's';
      span.style.fontSize = (1.5 + Math.random() * 1.5) + 'rem';
      cheerLayer.appendChild(span);
      setTimeout(() => span.remove(), 3200);
    }
  }

  function attemptCopy(text) {
    // Modern approach: use Clipboard API with fallback
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text)
        .then(() => {
          showToast("✅ OO AGAD SI LASINGGERO!");
        })
        .catch(() => {
          showToast("⚠️ Hindi na-copy. I-type na lang manually sa GC.");
        });
    } else {
      // Fallback for older browsers
      showToast("⚠️ Hindi na-copy. I-type na lang manually sa GC.");
    }
  }

  function showDoneBox() {
    rsvpForm.classList.remove('show');
    setTimeout(() => {
      rsvpForm.classList.add('hidden');
      doneBox.classList.remove('hidden');
    }, 350);
  }

  function showToast(msg) {
    // Fixed: Clear previous timer to prevent conflicts
    if (window._toastTimer) {
      clearTimeout(window._toastTimer);
    }
    
    toast.textContent = msg;
    toast.classList.add('show');
    
    window._toastTimer = setTimeout(() => {
      toast.classList.remove('show');
    }, 3200);
  }

  // Reposition NO button safely if window resizes
  window.addEventListener('resize', () => {
    if (!noBtn.classList.contains('hidden') && !noBtn.classList.contains('static-pos')) {
      const rect = noBtn.getBoundingClientRect();
      const maxX = Math.max(10, window.innerWidth - rect.width - 10);
      const maxY = Math.max(10, window.innerHeight - rect.height - 10);
      noBtn.style.left = Math.min(rect.left, maxX) + 'px';
      noBtn.style.top = Math.min(rect.top, maxY) + 'px';
    }
  });

  // Prevent text selection on button dodging
  noBtn.addEventListener('selectstart', (e) => e.preventDefault());
</script>

</body>
</html>
