<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOT NA!</title>
<style>
  :root {
    --bg-dark: #14161a;
    --card-bg: #1e2127;
    --amber: #ffb703;
    --orange: #ff7b00;
    --beer: #f4a300;
    --text-light: #f5f5f5;
    --text-muted: #a0a4ab;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    background: radial-gradient(circle at 50% 20%, #23262d 0%, var(--bg-dark) 70%);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-light);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 20px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 40px 32px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(255, 183, 3, 0.08),
      0 0 40px rgba(255, 123, 0, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.5);
    position: relative;
    animation: floatIn 0.6s ease-out;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  h1 {
    font-size: 2.6rem;
    margin: 0 0 8px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--amber), var(--orange));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(255, 123, 0, 0.35);
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    margin-bottom: 32px;
    font-style: italic;
  }

  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    position: relative;
    min-height: 60px;
  }

  button {
    font-family: inherit;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 14px 32px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #yesBtn {
    background: linear-gradient(135deg, var(--amber), var(--orange));
    color: #1a1300;
    box-shadow: 0 0 20px rgba(255, 183, 3, 0.5);
  }

  #yesBtn:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 0 30px rgba(255, 183, 3, 0.75);
  }

  #noBtn {
    background: #2a2d34;
    color: var(--text-light);
    border: 1px solid #3a3d44;
    position: fixed;
    z-index: 999;
    transition: top 0.18s ease, left 0.18s ease;
  }

  #noBtn.static-pos {
    position: relative;
    top: auto;
    left: auto;
  }

  .hidden {
    display: none !important;
  }

  #rsvpForm {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.5s ease, max-height 0.6s ease;
  }

  #rsvpForm.show {
    opacity: 1;
    max-height: 500px;
  }

  .field {
    text-align: left;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--beer);
    margin-bottom: 6px;
    font-weight: 600;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    background: #14161a;
    border: 1px solid #3a3d44;
    border-radius: 10px;
    color: var(--text-light);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 12px rgba(255, 123, 0, 0.35);
  }

  input::-webkit-calendar-picker-indicator {
    filter: invert(0.8) sepia(1) saturate(4) hue-rotate(-10deg);
    cursor: pointer;
  }

  #submitBtn {
    background: linear-gradient(135deg, var(--orange), #ff5400);
    color: #fff;
    margin-top: 4px;
    box-shadow: 0 0 20px rgba(255, 84, 0, 0.4);
  }

  #submitBtn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 0 28px rgba(255, 84, 0, 0.65);
  }

  .yes-locked {
    opacity: 0.55;
    pointer-events: none;
    transform: scale(0.95);
  }

  /* Custom alert / toast */
  #toast {
    position: fixed;
    left: 50%;
    bottom: 40px;
    transform: translateX(-50%) translateY(20px);
    background: var(--card-bg);
    border: 1px solid var(--orange);
    color: var(--text-light);
    padding: 16px 24px;
    border-radius: 14px;
    box-shadow: 0 0 30px rgba(255, 123, 0, 0.4);
    font-size: 0.95rem;
    max-width: 90vw;
    text-align: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 420px) {
    h1 { font-size: 2.1rem; }
    .card { padding: 32px 22px; }
    button { padding: 12px 22px; font-size: 1rem; }
  }
</style>
</head>
<body>

  <div class="card">
    <h1>SHOT NA! 🍻</h1>
    <p class="subtitle">Bawal drawing</p>

    <div class="btn-row">
      <button id="yesBtn" onclick="handleYes()">YES</button>
      <button id="noBtn" onmouseover="dodgeButton()" onclick="dodgeButton()">NO</button>
    </div>

    <form id="rsvpForm" onsubmit="handleSubmit(event)">
      <div class="field">
        <label for="whenInput">🗓️ Kailan?</label>
        <input type="datetime-local" id="whenInput" required>
      </div>
      <div class="field">
        <label for="whereInput">📍 Saan?</label>
        <input type="text" id="whereInput" placeholder="e.g. Kuya Jun's Videoke Bar" required>
      </div>
      <button type="submit" id="submitBtn">Submit 🍻</button>
    </form>
  </div>

  <div id="toast"></div>

<script>
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const rsvpForm = document.getElementById('rsvpForm');
  const toast = document.getElementById('toast');

  function dodgeButton() {
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - btnWidth - 10;
    const maxY = window.innerHeight - btnHeight - 10;

    const randomX = Math.max(10, Math.floor(Math.random() * maxX));
    const randomY = Math.max(10, Math.floor(Math.random() * maxY));

    noBtn.classList.remove('static-pos');
    noBtn.style.left = randomX + 'px';
    noBtn.style.top = randomY + 'px';
  }

  function handleYes() {
    noBtn.classList.add('hidden');
    yesBtn.classList.add('yes-locked');
    rsvpForm.classList.add('show');
  }

  function handleSubmit(event) {
    event.preventDefault();

    const whenRaw = document.getElementById('whenInput').value;
    const where = document.getElementById('whereInput').value;

    let whenFormatted = whenRaw;
    if (whenRaw) {
      const dateObj = new Date(whenRaw);
      whenFormatted = dateObj.toLocaleString('en-PH', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    const message =
`🍻 SHOT NA GUYS! 🍻

🗓️ Kailan: ${whenFormatted}
📍 Saan: ${where}

Wag kayo mag aalangan, punta na kayo! 🥴🎉
Sagot na yan, walang uuwing malinaw! 🍺🍺🍺`;

    copyToClipboard(message);
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text)
        .then(() => {
          showToast("🚫 BAWAL TALKSHIT! 🍻");
          resetToHome();
        })
        .catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      showToast("🚫 BAWAL TALKSHIT! 🍻");
      resetToHome();
    } catch (err) {
      showToast("⚠️ Copy failed. Try again or copy manually.");
    }
    document.body.removeChild(textarea);
  }

  function resetToHome() {
    setTimeout(() => {
      // Clear form fields
      rsvpForm.reset();
      rsvpForm.classList.remove('show');

      // Restore YES button
      yesBtn.classList.remove('yes-locked');

      // Restore NO button to its original spot in the layout
      noBtn.classList.remove('hidden');
      noBtn.classList.add('static-pos');
      noBtn.style.left = '';
      noBtn.style.top = '';
    }, 1500);
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => {
      toast.classList.remove('show');
    }, 3200);
  }

  // Reposition NO button safely if window resizes while it's floating
  window.addEventListener('resize', () => {
    if (!noBtn.classList.contains('hidden') && !noBtn.classList.contains('static-pos')) {
      const rect = noBtn.getBoundingClientRect();
      const maxX = window.innerWidth - rect.width - 10;
      const maxY = window.innerHeight - rect.height - 10;
      noBtn.style.left = Math.min(rect.left, Math.max(10, maxX)) + 'px';
      noBtn.style.top = Math.min(rect.top, Math.max(10, maxY)) + 'px';
    }
  });
</script>

</body>
</html>
